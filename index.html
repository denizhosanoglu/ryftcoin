<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYFTCOIN | Security Bypass</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        #game-container {
            width: 800px;
            height: 300px;
            border: 2px solid #333;
            position: relative;
            background: #0f0f0f;
            overflow: hidden; /* Dışarı taşan engelleri gizler */
        }

        #dino {
            width: 40px;
            height: 40px;
            background-color: #ffffff; /* Beyaz karakter */
            position: absolute;
            top: 130px; /* Ortadan başlar */
            left: 50px;
            border-radius: 4px;
        }

        .obstacle {
            width: 30px;
            position: absolute;
            background-color: #ff3e3e; /* Kırmızı engeller */
        }

        .obstacle-top {
            top: 0;
            border-radius: 0 0 4px 4px;
        }

        .obstacle-bottom {
            bottom: 0;
            border-radius: 4px 4px 0 0;
        }

        #score {
            margin-top: 20px;
            font-size: 1.5rem;
            letter-spacing: 3px;
        }

        .info {
            margin-bottom: 20px;
            color: #666;
            font-size: 1.2rem;
            letter-spacing: 5px;
        }

        /* Zıplama Animasyonu */
        .jump {
            animation: jump 0.5s linear;
        }

        @keyframes jump {
            0% { top: 130px; }
            30% { top: 60px; }
            70% { top: 60px; }
            100% { top: 130px; }
        }
    </style>
</head>
<body>

    <div class="info">PRESS SPACE</div>
    <div id="game-container">
        <div id="dino"></div>
    </div>
    <div id="score">SCORE: 0</div>

    <script>
        const dino = document.getElementById("dino");
        const container = document.getElementById("game-container");
        const scoreElement = document.getElementById("score");
        let score = 0;
        let isGameOver = false;

        function jump() {
            if (!isGameOver && dino.classList != "jump") {
                dino.classList.add("jump");
                setTimeout(function () {
                    dino.classList.remove("jump");
                }, 500);
            }
        }

        function createObstaclePair() {
            if (isGameOver) return;

            const obstacleTop = document.createElement("div");
            const obstacleBottom = document.createElement("div");
            obstacleTop.classList.add("obstacle", "obstacle-top");
            obstacleBottom.classList.add("obstacle", "obstacle-bottom");
            
            // Engellerin yüksekliğini rastgele ayarla (toplam 300px - karakter boşluğu)
            const topHeight = Math.floor(Math.random() * 150) + 20; // 20-170px arası
            const gap = 110; // Karakterin geçebileceği boşluk
            const bottomHeight = 300 - topHeight - gap;

            obstacleTop.style.height = topHeight + "px";
            obstacleBottom.style.height = bottomHeight + "px";
            
            container.appendChild(obstacleTop);
            container.appendChild(obstacleBottom);

            let obstaclePos = 800;
            let timer = setInterval(function () {
                if (isGameOver) {
                    clearInterval(timer);
                    return;
                }

                if (obstaclePos < -30) {
                    clearInterval(timer);
                    container.removeChild(obstacleTop);
                    container.removeChild(obstacleBottom);
                    score++;
                    scoreElement.innerHTML = "SCORE: " + score;
                }

                // Çarpışma Testi
                let dinoTop = parseInt(window.getComputedStyle(dino).getPropertyValue("top"));
                let dinoBottom = dinoTop + 40;

                // Yatay çarpışma aralığı
                if (obstaclePos > 50 && obstaclePos < 90) {
                    // Dikey çarpışma testi
                    if (dinoTop < topHeight || dinoBottom > (300 - bottomHeight)) {
                        isGameOver = true;
                        alert("SECURITY BREACH DETECTED!\nSKORUN: " + score);
                        location.reload(); // Sayfayı yenileyip oyunu sıfırlar
                    }
                }

                obstaclePos -= 5;
                obstacleTop.style.left = obstaclePos + "px";
                obstacleBottom.style.left = obstaclePos + "px";
            }, 20);
        }

        document.addEventListener("keydown", function (event) {
            if (event.code === "Space") {
                jump();
            }
        });

        // Her 2 saniyede bir yeni engel çifti (hızı ayarlayabilirsin)
        setInterval(createObstaclePair, 2000);
    </script>
</body>
</html>
