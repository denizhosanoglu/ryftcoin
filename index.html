<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYFTCOIN | Security Protocol</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41; /* Siber Yeşil */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        #game-container {
            width: 600px;
            height: 200px;
            border-bottom: 2px solid #333;
            position: relative;
            background: #0f0f0f;
        }

        #dino {
            width: 40px;
            height: 40px;
            background-color: #00ff41;
            position: absolute;
            bottom: 0;
            left: 50px;
        }

        .cactus {
            width: 20px;
            height: 40px;
            background-color: #ff3e3e; /* Engel Rengi */
            position: absolute;
            bottom: 0;
            right: -20px;
        }

        #score {
            margin-top: 20px;
            font-size: 1.5rem;
            letter-spacing: 3px;
        }

        .info {
            margin-bottom: 10px;
            color: #666;
            font-size: 0.8rem;
        }

        .jump {
            animation: jump 0.5s linear;
        }

        @keyframes jump {
            0% { bottom: 0; }
            30% { bottom: 100px; }
            70% { bottom: 100px; }
            100% { bottom: 0; }
        }
    </style>
</head>
<body>

    <div class="info">Sistem Yükleniyor... Beklerken Güvenlik Protokolünü Aş (Boşluk Tuşu)</div>
    <div id="game-container">
        <div id="dino"></div>
    </div>
    <div id="score">SCORE: 0</div>

    <script>
        const dino = document.getElementById("dino");
        const container = document.getElementById("game-container");
        const scoreElement = document.getElementById("score");
        let score = 0;

        function jump() {
            if (dino.classList != "jump") {
                dino.classList.add("jump");
                setTimeout(function () {
                    dino.classList.remove("jump");
                }, 500);
            }
        }

        function createCactus() {
            const cactus = document.createElement("div");
            cactus.classList.add("cactus");
            container.appendChild(cactus);

            let cactusPos = 600;
            let timer = setInterval(function () {
                if (cactusPos < -20) {
                    clearInterval(timer);
                    container.removeChild(cactus);
                    score++;
                    scoreElement.innerHTML = "SCORE: " + score;
                }

                // Çarpışma Testi
                let dinoTop = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));
                if (cactusPos > 50 && cactusPos < 90 && dinoTop <= 40) {
                    alert("SİSTEM ÇÖKTÜ! SKORUN: " + score);
                    score = 0;
                    scoreElement.innerHTML = "SCORE: 0";
                    cactusPos = 600;
                }

                cactusPos -= 5;
                cactus.style.left = cactusPos + "px";
            }, 20);
        }

        document.addEventListener("keydown", function (event) {
            if (event.code === "Space") {
                jump();
            }
        });

        // Her 1.5 saniyede bir yeni engel
        setInterval(createCactus, 1500);
    </script>
</body>
</html>
