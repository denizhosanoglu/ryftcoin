<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYFTCOIN | Security Bypass</title>
    <style>
        body {
            background-color: #050505; color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; margin: 0;
            overflow: hidden; text-transform: uppercase; user-select: none;
        }

        #main-layout { display: flex; gap: 20px; align-items: flex-start; }

        /* OYUN ALANI */
        #game-section { display: flex; flex-direction: column; }
        
        #game-container {
            width: 950px; height: 150px; position: relative;
            background: linear-gradient(180deg, #0a0a0a 0%, #111 50%, #0a0a0a 100%);
            border-top: 1px solid #333; border-bottom: 1px solid #333;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8) inset; overflow: hidden;
            cursor: crosshair;
        }

        #player {
            width: 30px; height: 30px; background-color: #fff;
            position: absolute; left: 100px; top: 310px;
            transition: top 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            border-radius: 4px; box-shadow: 0 0 15px rgba(255,255,255,0.8); z-index: 10;
        }

        .laser {
            width: 25px; position: absolute; background-color: #ff003c;
            box-shadow: 0 0 15px #ff003c; border-radius: 3px;
        }
        .laser-top { top: 0; }
        .laser-bottom { bottom: 0; }

        #ui-layer {
            display: flex; justify-content: space-between; width: 750px;
            margin-top: 15px; font-size: 1.2rem; color: #888; letter-spacing: 2px;
        }
        #score-display { color: #fff; text-shadow: 0 0 5px #fff; }

        /* SKOR TABLOSU (LEADERBOARD) */
        #leaderboard-section {
            width: 220px; height: 350px;
            border: 1px solid #333; background: rgba(10,10,10,0.5);
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 0 15px rgba(0,255,65,0.05);
        }

        #leaderboard-section h3 {
            color: #00ff41; letter-spacing: 3px; margin: 20px 0 10px 0;
            text-shadow: 0 0 10px rgba(0,255,65,0.5); font-size: 1.1rem;
        }

        #leaderboard-list { list-style: none; padding: 0; margin: 0; width: 85%; }
        #leaderboard-list li {
            display: flex; justify-content: space-between;
            padding: 10px 0; border-bottom: 1px dashed #333;
            font-size: 1.1rem; color: #aaa;
        }
        .rank-1 { color: #ffd700 !important; text-shadow: 0 0 5px #ffd700; font-weight: bold; }
        .rank-2 { color: #c0c0c0 !important; }
        .rank-3 { color: #cd7f32 !important; }

        /* BAŞLANGIÇ VE BİTİŞ EKRANLARI */
        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,10,10,0.85); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 20; backdrop-filter: blur(2px);
        }

        #game-over-screen { display: none; } /* Başlangıçta gizli */
        
        /* BAŞLANGIÇ BUTONU */
        .cyber-btn {
            background: transparent; border: 1px solid #00ff41; color: #00ff41;
            padding: 12px 25px; font-family: inherit; font-size: 1.2rem; letter-spacing: 3px;
            cursor: pointer; margin-top: 20px; transition: 0.3s;
        }
        .cyber-btn:hover { background: rgba(0, 255, 65, 0.1); box-shadow: 0 0 15px #00ff41; }

        #game-over-screen h1 { color: #ff003c; font-size: 3rem; margin: 0 0 10px 0; letter-spacing: 10px; text-shadow: 0 0 15px #ff003c; }
        .blink { animation: blinker 1.5s linear infinite; color: #fff; margin-top: 20px; }
        @keyframes blinker { 50% { opacity: 0; } }

    </style>
</head>
<body>

    <div style="margin-bottom: 15px; color: #555; letter-spacing: 4px; text-align: center;">
        [ INITIATE OVERRIDE: SPACEBAR / CLICK / TAP ]
    </div>
    
    <div id="main-layout">
        <div id="game-section">
            <div id="game-container">
                <div id="player"></div>
                
                <div id="start-screen" class="overlay-screen">
                    <h2 style="color: #00ff41; letter-spacing: 8px; margin: 0;">RYFTCOIN OS</h2>
                    <div style="color: #555; margin-bottom: 20px;">v5.1 SECURE PROTOCOL</div>
                    <button id="start-btn" class="cyber-btn">INITIATE CONNECTION</button>
                </div>

                <div id="game-over-screen" class="overlay-screen">
                    <h1>SYSTEM FAILURE</h1>
                    <div id="final-score" style="font-size: 1.5rem; color: #aaa;">DATA EXTRACTED: 0</div>
                    <div class="blink">TAP OR PRESS SPACE TO REBOOT</div>
                </div>
            </div>

            <div id="ui-layer">
                <div id="speed-display" style="color: #00ff41;">SPEED: 1.0x</div>
                <div id="score-display">SCORE: 0</div>
            </div>
        </div>

        <div id="leaderboard-section">
            <h3>TOP HACKERS</h3>
            <ul id="leaderboard-list"></ul>
        </div>
    </div>

    <script>
        const player = document.getElementById("player");
        const container = document.getElementById("game-container");
        const scoreDisplay = document.getElementById("score-display");
        const speedDisplay = document.getElementById("speed-display");
        const gameOverScreen = document.getElementById("game-over-screen");
        const startScreen = document.getElementById("start-screen");
        const finalScoreDisplay = document.getElementById("final-score");
        const leaderboardList = document.getElementById("leaderboard-list");

        let score = 0;
        let gameSpeed = 6;
        let isGameOver = false;
        let isGameStarted = false; // YENİ: Oyun başladı mı kontrolü
        let isGrounded = true; 
        let lasers = []; 
        let spawnInterval;
        let animationFrameId;

        // --- SKOR TABLOSU SİSTEMİ (Şimdilik Local) ---
        function loadLeaderboard() {
            let records = JSON.parse(localStorage.getItem("ryftcoin_scores")) || [];
            leaderboardList.innerHTML = "";
            
            if (records.length === 0) {
                leaderboardList.innerHTML = "<li style='text-align:center; display:block; border:none; margin-top:20px;'>NO RECORDS YET</li>";
                return;
            }

            records.slice(0, 5).forEach((record, index) => {
                let li = document.createElement("li");
                li.innerHTML = `<span>${record.name}</span> <span>${record.score}</span>`;
                if(index === 0) li.classList.add("rank-1");
                if(index === 1) li.classList.add("rank-2");
                if(index === 2) li.classList.add("rank-3");
                leaderboardList.appendChild(li);
            });
        }

        function checkHighscore(finalScore) {
            if (finalScore === 0) return;
            let records = JSON.parse(localStorage.getItem("ryftcoin_scores")) || [];
            
            if (records.length < 5 || finalScore > records[records.length - 1].score) {
                setTimeout(() => {
                    let name = prompt("NEW HIGH SCORE! Enter 10 letters:", "RYF");
                    if (name) {
                        name = name.substring(0, 10).toUpperCase();
                        records.push({ name: name, score: finalScore });
                        records.sort((a, b) => b.score - a.score); 
                        records = records.slice(0, 5); 
                        localStorage.setItem("ryftcoin_scores", JSON.stringify(records));
                        loadLeaderboard();
                    }
                }, 100);
            }
        }

        // --- OYUN MEKANİKLERİ ---
        function flipGravity() {
            if (!isGameStarted) return; // Oyun başlamadıysa hiçbir şey yapma
            
            if (isGameOver) { 
                resetGame(); 
                return; 
            }
            
            if (isGrounded) {
                player.style.top = "10px";
                isGrounded = false;
            } else {
                player.style.top = "310px";
                isGrounded = true;
            }
        }

        function spawnLaser() {
            if (isGameOver || !isGameStarted) return;
            const laser = document.createElement("div");
            laser.classList.add("laser");
            const isTop = Math.random() > 0.5;
            laser.classList.add(isTop ? "laser-top" : "laser-bottom");
            
            const height = Math.floor(Math.random() * 120) + 70; 
            laser.style.height = height + "px";
            laser.style.left = "750px"; 
            
            container.appendChild(laser);
            lasers.push({ element: laser, x: 750, isTop: isTop, height: height, passed: false });

            let nextSpawnTime = Math.max(650, 1500 - (score * 25));
            spawnInterval = setTimeout(spawnLaser, nextSpawnTime);
        }

        function gameLoop() {
            if (isGameOver || !isGameStarted) return;

            let pTop = player.offsetTop;
            let pBottom = pTop + 30;
            let pLeft = 100;
            let pRight = 130;

            for (let i = 0; i < lasers.length; i++) {
                let l = lasers[i];
                l.x -= gameSpeed; 
                l.element.style.left = l.x + "px";

                let lLeft = l.x;
                let lRight = l.x + 25; 

                if (pRight > lLeft && pLeft < lRight) {
                    if (l.isTop && pTop < l.height) triggerGameOver();
                    else if (!l.isTop && pBottom > (350 - l.height)) triggerGameOver();
                }

                if (!l.passed && l.x < pLeft) {
                    l.passed = true;
                    score++;
                    scoreDisplay.innerText = "SCORE: " + score;
                    gameSpeed += 0.15; 
                    speedDisplay.innerText = "SPEED: " + (gameSpeed / 6).toFixed(1) + "x";
                }

                if (l.x < -40) {
                    l.element.remove();
                    lasers.splice(i, 1);
                    i--;
                }
            }
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function triggerGameOver() {
            isGameOver = true;
            clearTimeout(spawnInterval);
            cancelAnimationFrame(animationFrameId);
            finalScoreDisplay.innerText = "DATA EXTRACTED: " + score + " BLOCKS";
            gameOverScreen.style.display = "flex";
            checkHighscore(score);
        }

        function resetGame() {
            lasers.forEach(l => l.element.remove());
            lasers = [];
            score = 0;
            gameSpeed = 6;
            scoreDisplay.innerText = "SCORE: 0";
            speedDisplay.innerText = "SPEED: 1.0x";
            gameOverScreen.style.display = "none";
            startScreen.style.display = "none"; // Start ekranını gizle
            
            isGameOver = false;
            player.style.top = "310px";
            isGrounded = true;

            spawnLaser();
            gameLoop();
        }

        // --- EVENT LISTENERS (KONTROLLER) ---
        
        // BAŞLA BUTONU TIKLAMASI
        document.getElementById("start-btn").addEventListener("click", function() {
            isGameStarted = true;
            resetGame();
        });

        document.addEventListener("keydown", function (event) {
            if (event.code === "Space") {
                event.preventDefault(); 
                flipGravity();
            }
        });

        document.addEventListener("pointerdown", function(event) {
            if(event.target.tagName !== "BUTTON" && event.target.tagName !== "INPUT") {
               if(document.activeElement.tagName !== "INPUT") {
                    flipGravity();
               }
            }
        });

        // Sayfa yüklendiğinde sadece skorları çek, oyunu BAŞLATMA
        loadLeaderboard();
    </script>
</body>
</html>
