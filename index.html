<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYFTCOIN | 1v1 Security Bypass</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
            user-select: none;
        }

        #game-container {
            width: 800px;
            height: 350px;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            position: relative;
            background: linear-gradient(180deg, #0a0a0a 0%, #111 50%, #0a0a0a 100%);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8) inset;
        }

        /* Ortak Karakter Özellikleri */
        .player {
            width: 30px;
            height: 30px;
            position: absolute;
            transition: top 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            border-radius: 4px;
            z-index: 10;
        }

        /* PLAYER 1 (Beyaz) */
        #p1 {
            background-color: #fff;
            left: 100px;
            top: 310px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 5px rgba(255, 255, 255, 0.5) inset;
        }

        /* PLAYER 2 (Siber Mavi) */
        #p2 {
            background-color: #00e5ff;
            left: 150px; /* Biraz daha geriden gelir */
            top: 310px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.8), 0 0 5px rgba(0, 229, 255, 0.5) inset;
        }

        .laser {
            width: 25px;
            position: absolute;
            background-color: #ff003c;
            box-shadow: 0 0 15px #ff003c, 0 0 30px #ff003c;
            border-radius: 3px;
        }
        .laser-top { top: 0; }
        .laser-bottom { bottom: 0; }

        #ui-layer {
            display: flex;
            justify-content: space-between;
            width: 800px;
            margin-top: 15px;
            font-size: 1.2rem;
            color: #888;
            letter-spacing: 2px;
        }

        .p1-text { color: #fff; text-shadow: 0 0 5px #fff; }
        .p2-text { color: #00e5ff; text-shadow: 0 0 5px #00e5ff; }

        #game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            backdrop-filter: blur(2px);
        }

        #game-over-screen h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            letter-spacing: 5px;
        }

        .blink {
            animation: blinker 1.5s linear infinite;
            color: #fff;
            margin-top: 20px;
        }

        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div style="margin-bottom: 15px; color: #555; letter-spacing: 2px;">
        <span class="p1-text">P1: [W]</span> // PVP PROTOCOL // <span class="p2-text">P2: [UP ARROW]</span>
    </div>
    
    <div id="game-container">
        <div id="p1" class="player"></div>
        <div id="p2" class="player"></div>
        
        <div id="game-over-screen">
            <h1 id="winner-text">SYSTEM FAILURE</h1>
            <div class="blink">PRESS SPACE TO REMATCH</div>
        </div>
    </div>

    <div id="ui-layer">
        <div class="p1-text">PLAYER 1: READY</div>
        <div id="score-display" style="color: #444;">SPEED: 1.0x</div>
        <div class="p2-text">PLAYER 2: READY</div>
    </div>

    <script>
        const p1 = { el: document.getElementById("p1"), isGrounded: true, isDead: false, top: 310, left: 100 };
        const p2 = { el: document.getElementById("p2"), isGrounded: true, isDead: false, top: 310, left: 150 };
        
        const container = document.getElementById("game-container");
        const gameOverScreen = document.getElementById("game-over-screen");
        const winnerText = document.getElementById("winner-text");
        const speedDisplay = document.getElementById("score-display");

        let gameSpeed = 6;
        let isGameOver = false;
        let lasers = [];
        let spawnInterval;
        let animationFrameId;

        function flipGravity(playerObj) {
            if (isGameOver || playerObj.isDead) return;
            if (playerObj.isGrounded) {
                playerObj.el.style.top = "10px";
                playerObj.isGrounded = false;
            } else {
                playerObj.el.style.top = "310px";
                playerObj.isGrounded = true;
            }
        }

        function spawnLaser() {
            if (isGameOver) return;

            const laser = document.createElement("div");
            laser.classList.add("laser");
            const isTop = Math.random() > 0.5;
            laser.classList.add(isTop ? "laser-top" : "laser-bottom");
            
            const height = Math.floor(Math.random() * 120) + 70; 
            laser.style.height = height + "px";
            laser.style.left = "800px";
            
            container.appendChild(laser);
            
            lasers.push({ element: laser, x: 800, isTop: isTop, height: height });

            gameSpeed += 0.1; // Her lazerde oyun hızlanır
            speedDisplay.innerText = "SPEED: " + (gameSpeed / 6).toFixed(1) + "x";

            let nextSpawnTime = Math.max(600, 1500 - ((gameSpeed - 6) * 100));
            spawnInterval = setTimeout(spawnLaser, nextSpawnTime);
        }

        function checkCollision(playerObj, lLeft, lRight, l) {
            if (playerObj.isDead) return false;
            
            // Gerçek zamanlı koordinat hesabı
            let pTop = playerObj.el.offsetTop;
            let pBottom = pTop + 30;
            let pLeft = playerObj.left;
            let pRight = pLeft + 30;

            if (pRight > lLeft && pLeft < lRight) {
                if (l.isTop && pTop < l.height) return true;
                if (!l.isTop && pBottom > (350 - l.height)) return true;
            }
            return false;
        }

        function gameLoop() {
            if (isGameOver) return;

            for (let i = 0; i < lasers.length; i++) {
                let l = lasers[i];
                l.x -= gameSpeed;
                l.element.style.left = l.x + "px";

                let lLeft = l.x;
                let lRight = l.x + 25;

                // Oyuncu 1 Çarpışma
                if (checkCollision(p1, lLeft, lRight, l)) {
                    p1.isDead = true;
                    p1.el.style.display = "none";
                }
                
                // Oyuncu 2 Çarpışma
                if (checkCollision(p2, lLeft, lRight, l)) {
                    p2.isDead = true;
                    p2.el.style.display = "none";
                }

                // Kazanma Kontrolü
                if (p1.isDead && !p2.isDead) triggerGameOver("PLAYER 2 WINS!", "#00e5ff");
                else if (p2.isDead && !p1.isDead) triggerGameOver("PLAYER 1 WINS!", "#fff");
                else if (p1.isDead && p2.isDead) triggerGameOver("DRAW - BOTH DESTROYED", "#ff003c"); // İkisi aynı anda çarparsa

                if (l.x < -40) {
                    l.element.remove();
                    lasers.splice(i, 1);
                    i--;
                }
            }
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function triggerGameOver(text, color) {
            isGameOver = true;
            clearTimeout(spawnInterval);
            cancelAnimationFrame(animationFrameId);
            winnerText.innerText = text;
            winnerText.style.color = color;
            winnerText.style.textShadow = "0 0 20px " + color;
            gameOverScreen.style.display = "flex";
        }

        function resetGame() {
            lasers.forEach(l => l.element.remove());
            lasers = [];
            gameSpeed = 6;
            speedDisplay.innerText = "SPEED: 1.0x";
            gameOverScreen.style.display = "none";
            isGameOver = false;
            
            p1.isDead = false; p1.isGrounded = true; p1.el.style.top = "310px"; p1.el.style.display = "block";
            p2.isDead = false; p2.isGrounded = true; p2.el.style.top = "310px"; p2.el.style.display = "block";

            spawnLaser();
            gameLoop();
        }

        document.addEventListener("keydown", function (event) {
            if (event.code === "KeyW") flipGravity(p1);
            if (event.code === "ArrowUp") { event.preventDefault(); flipGravity(p2); }
            if (event.code === "Space" && isGameOver) resetGame(); // Yeniden başlatma tuşu
        });

        spawnLaser();
        gameLoop();
    </script>
</body>
</html>
