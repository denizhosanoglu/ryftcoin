<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYFTCOIN | Security Bypass</title>
    <style>
        /* Siber Karanlık Tema ve Seçim Engelleme */
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
            user-select: none; /* Metin seçilmesini engeller */
        }

        /* Oyun Alanı */
        #game-container {
            width: 800px;
            height: 350px;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            position: relative;
            background: linear-gradient(180deg, #0a0a0a 0%, #111 50%, #0a0a0a 100%);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8) inset;
        }

        /* Ana Karakter (Veri Paketi) */
        #player {
            width: 30px;
            height: 30px;
            background-color: #fff;
            position: absolute;
            left: 100px;
            top: 310px; /* Tabanda Başlar (350 - 30 - 10 margin) */
            transition: top 0.35s cubic-bezier(0.25, 1, 0.5, 1); /* Çok daha pürüzsüz geçiş */
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 5px rgba(255, 255, 255, 0.5) inset;
            z-index: 10;
        }

        /* Düşman Lazerler */
        .laser {
            width: 25px;
            position: absolute;
            background-color: #ff003c;
            box-shadow: 0 0 15px #ff003c, 0 0 30px #ff003c; /* Neon Parlama */
            border-radius: 3px;
        }
        .laser-top { top: 0; }
        .laser-bottom { bottom: 0; }

        /* Arayüz */
        #ui-layer {
            display: flex;
            justify-content: space-between;
            width: 800px;
            margin-top: 15px;
            font-size: 1.2rem;
            color: #888;
            letter-spacing: 2px;
        }

        #score-display { color: #fff; text-shadow: 0 0 5px #fff; }

        /* GAME OVER EKRANI */
        #game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            backdrop-filter: blur(2px);
        }

        #game-over-screen h1 {
            color: #ff003c;
            font-size: 3rem;
            margin: 0 0 10px 0;
            letter-spacing: 10px;
            text-shadow: 0 0 20px #ff003c;
        }

        .blink {
            animation: blinker 1.5s linear infinite;
            color: #fff;
            margin-top: 20px;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div style="margin-bottom: 15px; color: #555; letter-spacing: 4px;">[ INITIATE GRAVITY OVERRIDE: SPACEBAR ]</div>
    
    <div id="game-container">
        <div id="player"></div>
        
        <div id="game-over-screen">
            <h1>SYSTEM FAILURE</h1>
            <div id="final-score" style="font-size: 1.5rem; color: #aaa;">DATA EXTRACTED: 0</div>
            <div class="blink">PRESS SPACE TO REBOOT</div>
        </div>
    </div>

    <div id="ui-layer">
        <div>STATUS: <span style="color: #00ff41;">ONLINE</span></div>
        <div id="score-display">SCORE: 0</div>
    </div>

    <script>
        const player = document.getElementById("player");
        const container = document.getElementById("game-container");
        const scoreDisplay = document.getElementById("score-display");
        const gameOverScreen = document.getElementById("game-over-screen");
        const finalScoreDisplay = document.getElementById("final-score");

        let score = 0;
        let gameSpeed = 6; // Başlangıç hızı
        let isGameOver = false;
        let isGrounded = true; 
        let lasers = []; // Lazerleri takip edeceğimiz dizi
        let spawnInterval;
        let animationFrameId;

        // Yer Çekimi Değiştirme
        function flipGravity() {
            if (isGameOver) {
                resetGame();
                return;
            }
            if (isGrounded) {
                player.style.top = "10px"; // Tavana sıfırlanma payı
                isGrounded = false;
            } else {
                player.style.top = "310px"; // Tabana sıfırlanma payı
                isGrounded = true;
            }
        }

        // Lazer Üretimi
        function spawnLaser() {
            if (isGameOver) return;

            const laser = document.createElement("div");
            laser.classList.add("laser");
            
            const isTop = Math.random() > 0.5;
            laser.classList.add(isTop ? "laser-top" : "laser-bottom");
            
            // Lazer boyutu (70px ile 190px arası)
            const height = Math.floor(Math.random() * 120) + 70; 
            laser.style.height = height + "px";
            laser.style.left = "800px"; // Ekranın en sağından başla
            
            container.appendChild(laser);
            
            // Lazer objesini listeye ekle
            lasers.push({
                element: laser,
                x: 800,
                isTop: isTop,
                height: height,
                passed: false
            });

            // Zorluk artışı: Yeni lazer gelme süresi hızlandıkça kısalır
            let nextSpawnTime = Math.max(700, 1500 - (score * 20));
            spawnInterval = setTimeout(spawnLaser, nextSpawnTime);
        }

        // Profesyonel Oyun Döngüsü (Game Loop)
        function gameLoop() {
            if (isGameOver) return;

            // Oyuncunun anlık kesin pozisyonunu al (Geçiş anında bile kusursuz Hitbox için)
            let playerRect = player.getBoundingClientRect();
            let containerRect = container.getBoundingClientRect();
            
            // Oyuncunun kutu içindeki X ve Y koordinatları
            let pTop = playerRect.top - containerRect.top;
            let pBottom = pTop + 30; // 30px karakter boyu
            let pLeft = playerRect.left - containerRect.left;
            let pRight = pLeft + 30;

            for (let i = 0; i < lasers.length; i++) {
                let l = lasers[i];
                l.x -= gameSpeed; // Lazerleri sola kaydır
                l.element.style.left = l.x + "px";

                // Çarpışma Kontrolü (Hitbox Math)
                let lLeft = l.x;
                let lRight = l.x + 25; // 25px lazer genişliği

                if (pRight > lLeft && pLeft < lRight) {
                    if (l.isTop && pTop < l.height) {
                        triggerGameOver();
                    } else if (!l.isTop && pBottom > (350 - l.height)) {
                        triggerGameOver();
                    }
                }

                // Lazer oyuncuyu geçtiyse skoru artır
                if (!l.passed && l.x < pLeft) {
                    l.passed = true;
                    score++;
                    scoreDisplay.innerText = "SCORE: " + score;
                    gameSpeed += 0.15; // Hızlanma
                }

                // Ekranda çıkan lazeri sil
                if (l.x < -40) {
                    l.element.remove();
                    lasers.splice(i, 1);
                    i--;
                }
            }

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function triggerGameOver() {
            isGameOver = true;
            clearTimeout(spawnInterval);
            cancelAnimationFrame(animationFrameId);
            finalScoreDisplay.innerText = "DATA EXTRACTED: " + score + " BLOCKS";
            gameOverScreen.style.display = "flex";
        }

        function resetGame() {
            // Ekrani Temizle
            lasers.forEach(l => l.element.remove());
            lasers = [];
            score = 0;
            gameSpeed = 6;
            scoreDisplay.innerText = "SCORE: 0";
            gameOverScreen.style.display = "none";
            isGameOver = false;
            
            // Karakteri tabana al
            player.style.top = "310px";
            isGrounded = true;

            // Oyunu Başlat
            spawnLaser();
            gameLoop();
        }

        // Kontroller
        document.addEventListener("keydown", function (event) {
            if (event.code === "Space") {
                event.preventDefault(); // Tarayıcının aşağı kaymasını KESİNLİKLE engeller
                flipGravity();
            }
        });

        // Oyunu İlk Başlatma
        spawnLaser();
        gameLoop();
    </script>
</body>
</html>
