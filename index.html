<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYFTCOIN | The Central Hub</title>
    <style>
        /* Minimalist & Cyber Dark Theme */
        body {
            background-color: #0a0a0a; /* Zifiri karanlık */
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            border: 1px solid #333;
            padding: 3rem;
            border-radius: 8px;
            background: linear-gradient(145deg, #0f0f0f, #050505);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            color: #ffffff;
            font-weight: 200;
        }

        .status {
            color: #00ff41; /* Matrix Yeşili - Sistem aktif mesajı */
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 2rem;
            border-top: 1px solid #222;
            padding-top: 2rem;
        }

        .stat-box {
            padding: 10px;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.2rem;
            color: #bbb;
        }

        .btn {
            margin-top: 2rem;
            padding: 12px 40px;
            background: transparent;
            border: 1px solid #444;
            color: #888;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
        }

        .btn:hover {
            border-color: #eee;
            color: #eee;
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>RYFTCOIN</h1>
        <div class="status">> INITIALIZING SYSTEM ARCHITECTURE_</div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Network Status</div>
                <div class="stat-value">Secured</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Vault Reserve</div>
                <div class="stat-value">Locked</div>
            </div>
        </div>

        <button class="btn">Enter the Rift</button>
    </div>

</body>
</html>
