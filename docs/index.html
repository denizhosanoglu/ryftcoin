<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryft Clicker</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; text-align: center; }
        .coin { 
            width: 200px; cursor: pointer; transition: transform 0.1s; 
            user-select: none; margin-top: 50px;
        }
        .coin:active { transform: scale(0.9); }
        .stats { font-size: 1.5rem; margin-top: 20px; color: #58a6ff; }
        .global { color: #7ee787; font-size: 1.2rem; }
    </style>
</head>
<body>
    <h1>Ryft Clicker</h1>
    <p>Coin'e tıkla ve backend'e gönder!</p>

    <div id="coin" class="coin" style="font-size: 100px;">🪙</div>

    <div class="stats">Senin Kazancın: <span id="my-score">0</span></div>
    <div class="global">Dünya Geneli Toplam: <span id="global-score">0</span></div>

    <script>
        let score = 0;
        const coin = document.getElementById('coin');
        const myScoreDisplay = document.getElementById('my-score');
        const globalScoreDisplay = document.getElementById('global-score');

        coin.onclick = async () => {
            score++;
            myScoreDisplay.innerText = score;

            try {
                // Backend'e POST isteği gönderiyoruz
                const response = await fetch('https://api.ryftcoin.com/click', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                globalScoreDisplay.innerText = data.globalTotal;
            } catch (err) {
                console.error("Backend bağlantı hatası");
            }
        };
    </script>
</body>
</html>
